<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema PWA</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#10b981">
    
    <style>
        /* Estilos generales de la PWA */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f1f5f9;
        }

        /* Contenedor del Ticket en la Interfaz */
        .ticket-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #ffffff;
            padding: 24px;
            border-radius: 12px;
            max-width: 460px;
            margin: 20px auto;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .ticket-preview {
            background-color: #fafafa;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            line-height: 1.3;
            padding: 20px;
            border-radius: 6px;
            border: 1px solid #e2e8f0;
            white-space: pre-wrap;
            width: 100%;
            color: #0f172a;
            box-sizing: border-box;
        }

        .ticket-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            width: 100%;
        }

        .btn-primary, .btn-secondary {
            flex: 1;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: background-color 0.2s;
        }

        .btn-primary {
            background-color: #10b981;
            color: white;
        }

        .btn-primary:hover {
            background-color: #059669;
        }

        .btn-secondary {
            background-color: #e2e8f0;
            color: #334155;
        }

        /* Reglas de Impresión del Navegador */
        @media print {
            body * {
                visibility: hidden;
            }
            .ticket-preview, .ticket-preview * {
                visibility: visible;
            }
            .ticket-preview {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                border: none;
                padding: 0;
                margin: 0;
                font-size: 12px;
                background: transparent;
            }
        }
    </style>
</head>
<body>

    <main>
        <!-- Contenido principal de tu PWA aquí -->
        
        <!-- Módulo del Ticket Integrado -->
        <div id="modulo-ticket" class="ticket-container">
            <pre id="ticket-preview" class="ticket-preview">Generando venta...</pre>
            <div class="ticket-actions">
                <button id="btn-print" class="btn-primary">Imprimir Ticket</button>
                <button id="btn-close" class="btn-secondary">Nueva Venta</button>
            </div>
        </div>
    </main>

    <script>
        // Registro del Service Worker existente
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker registrado con éxito', reg.scope))
                    .catch(err => console.error('Error al registrar el Service Worker', err));
            });
        }

        // LÓGICA DEL TICKET INCORPORADA AL SISTEMA
        function generarTicketTexto(venta) {
            const anchoTotal = 50; 
            const lineaDivisoria = "-".repeat(anchoTotal);
            const lineaDoble = "=".repeat(anchoTotal);

            const centrar = (texto) => {
                const espacios = Math.max(0, Math.floor((anchoTotal - texto.length) / 2));
                return " ".repeat(espacios) + texto;
            };

            const alinearColumnas = (col1, col2, col3, col4) => {
                const d = col1.padEnd(22).substring(0, 22);
                const c = col2.padStart(5).substring(0, 5);
                const p = col3.padStart(11).substring(0, 11);
                const i = col4.padStart(12).substring(0, 12);
                return `${d}${c}${p}${i}`;
            };

            const alinearTotal = (etiqueta, monto) => {
                const espacios = anchoTotal - etiqueta.length - monto.length;
                return etiqueta + " ".repeat(espacios > 0 ? espacios : 1) + monto;
            };

            let ticket = "";
            ticket += `${lineaDoble}\n`;
            ticket += `${centrar(venta.local.nombre.toUpperCase())}\n`;
            ticket += `${lineaDoble}\n`;
            ticket += `${centrar(venta.local.eslogan)}\n`;
            ticket += `${centrar(venta.local.direccion)}\n`;
            ticket += `${centrar(venta.local.ciudad)}\n`;
            ticket += `${centrar(`RFC: ${venta.local.rfc}`)}\n`;
            ticket += `${centrar(`Tel: ${venta.local.telefono}`)}\n\n`;

            ticket += `Folio: ${venta.folio.toString().padStart(6, '0')}\n`;
            ticket += `Fecha: ${venta.fecha} | Cajero: ${venta.cajero}\n`;
            ticket += `${lineaDivisoria}\n`;
            ticket += `${alinearColumnas("DESCRIPCIÓN", "CANT", "P.UNIT", "IMPORTE")}\n`;
            ticket += `${lineaDivisoria}\n`;

            venta.productos.forEach(prod => {
                ticket += `${alinearColumnas(prod.descripcion, prod.cantidad.toString(), prod.precio.toFixed(2), prod.importe.toFixed(2))}\n`;
            });

            ticket += `${lineaDivisoria}\n`;
            ticket += `${alinearTotal("SUBTOTAL", `$ ${venta.subtotal.toFixed(2)}`)}\n`;
            ticket += `${alinearTotal(`IVA (${venta.porcentajeIva}%)`, `$ ${venta.iva.toFixed(2)}`)}\n`;
            ticket += `${lineaDivisoria}\n`;
            ticket += `${alinearTotal("TOTAL", `$ ${venta.total.toFixed(2)}`)}\n`;
            ticket += `${lineaDivisoria}\n\n`;

            ticket += `Método de Pago: ${venta.metodoPago}\n`;
            ticket += `Efectivo: $ ${venta.pagoEfectivo.toFixed(2)} | Cambio: $ ${venta.cambio.toFixed(2)}\n\n`;

            ticket += `${lineaDoble}\n`;
            ticket += `${centrar("¡Gracias por tu preferencia!")}\n`;
            ticket += `${centrar("Tu compra impulsa el comercio local.")}\n`;
            ticket += `${lineaDoble}\n`;
            ticket += `${centrar("Para facturación o aclaraciones,")}\n`;
            ticket += `${centrar(`conserva este ticket (Válido ${venta.local.diasFacturacion} días)`)}\n`;
            ticket += `${centrar(venta.local.web)}\n`;

            return ticket;
        }

        // Simulación de inicialización con datos del estado de la app
        const ventaMock = {
            folio: 2345,
            fecha: new Date().toLocaleString(),
            cajero: "Admin",
            subtotal: 620.00,
            porcentajeIva: 16,
            iva: 99.20,
            total: 719.20,
            metodoPago: "Tarjeta de Débito",
            pagoEfectivo: 0.00,
            cambio: 0.00,
            local: {
                nombre: "Nombre del Local",
                eslogan: "Línea de eslogan o giro aquí",
                direccion: "Av. Universidad No. 100, Col. Centro",
                ciudad: "Huajuapan de León, Oax.",
                rfc: "ABC-123456-XYZ",
                telefono: "953-123-4567",
                diasFacturacion: 30,
                web: "www.tunegocio.com"
            },
            productos: [
                { descripcion: "Producto o Servicio A", cantidad: 1, precio: 150.00, importe: 150.00 },
                { descripcion: "Producto o Servicio B", cantidad: 2, precio: 45.00, importe: 90.00 },
                { descripcion: "Producto o Servicio C", cantidad: 1, precio: 380.00, importe: 380.00 }
            ]
        };

        // Renderizar el contenido al cargar la vista del ticket
        document.getElementById('ticket-preview').textContent = generarTicketTexto(ventaMock);

        // Acciones de los botones
        document.getElementById('btn-print').addEventListener('click', () => {
            window.print();
        });

        document.getElementById('btn-close').addEventListener('click', () => {
            // Lógica para limpiar el carrito y resetear la vista
            console.log("Nueva venta iniciada");
        });
    </script>
</body>
</html>
